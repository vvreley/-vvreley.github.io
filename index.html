<!DOCTYPE html>
<html>
<head>
  <title>My OCs</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      margin: 10px;
      display: inline-block;
      width: 160px;
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    select {
      padding: 5px;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>My OC Collection</h1>

<select id="filter">
  <option value="all">All</option>
  <option value="kitsune">Kitsune</option>
  <option value="angel">Angel</option>
  <option value="human">Human</option>
</select>

<div id="container"></div>

<script>
const ocs = [
  {
    name: "Aiko",
    species: "kitsune",
    trait: "soft",
    image: "https://via.placeholder.com/150"
  },
  {
    name: "Kyorei",
    species: "kitsune",
    trait: "calm",
    image: "https://via.placeholder.com/150"
  },
  {
    name: "Zyriel",
    species: "angel",
    trait: "divine",
    image: "https://via.placeholder.com/150"
  }
];

const container = document.getElementById("container");

function display(list) {
  container.innerHTML = "";
  list.forEach(oc => {
    container.innerHTML += `
      <div class="card">
        <img src="${oc.image}">
        <h3>${oc.name}</h3>
        <p>${oc.species}</p>
        <p>${oc.trait}</p>
      </div>
    `;
  });
}

display(ocs);

document.getElementById("filter").addEventListener("change", (e) => {
  const value = e.target.value;

  if (value === "all") {
    display(ocs);
  } else {
    display(ocs.filter(o => o.species === value));
  }
});
</script>

</body>
</html>
